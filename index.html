<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MaibaSync Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <script>eruda.init();</script>
</head>

<body class="p-4 min-h-screen">
    <div class="max-w-md mx-auto space-y-4">
        <div class="text-center pt-4 mb-2">
            <h1 class="text-3xl font-black italic tracking-tighter transition-colors duration-500">
                Maiba<span id="brand-sync" class="text-green-500 text-4xl transition-colors duration-500">Sync</span>
            </h1>
            <p class="text-[9px] text-gray-600 font-bold tracking-[0.3em] uppercase mt-1">Enterprise Security Protocol
            </p>
        </div>

        <div class="flex border-b border-gray-800 mb-6">
            <button onclick="switchTab('form')" id="tab-form"
                class="flex-1 py-4 font-black text-xs tracking-widest tab-active-wa uppercase transition-all">Programar</button>
            <button onclick="switchTab('list')" id="tab-list"
                class="flex-1 py-4 font-black text-xs tracking-widest text-gray-500 uppercase transition-all">Mis
                Mensajes</button>
        </div>

        <div id="view-form" class="glass-card rounded-[2.5rem] p-7 space-y-5">
            <input type="hidden" id="edit-id">
            <div class="flex bg-black/40 p-1 rounded-xl border border-white/5">
                <button onclick="setCanal('tg')" id="btn-tg"
                    class="flex-1 py-3 rounded-lg text-xs font-black text-gray-500 uppercase flex items-center justify-center gap-2 transition-all">
                    <i data-lucide="send" class="w-4 h-4"></i> <span>Telegram</span>
                </button>
                <button onclick="setCanal('wa')" id="btn-wa"
                    class="flex-1 py-3 rounded-lg text-xs font-black bg-green-500 text-white uppercase flex items-center justify-center gap-2 transition-all shadow-lg">
                    <i data-lucide="message-circle" class="w-4 h-4"></i> <span>WhatsApp</span>
                </button>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black text-gray-500 uppercase ml-1">Destinatarios (Máx 3)</label>
                <div class="flex gap-2">
                    <input type="tel" id="telefono-input" placeholder="6441112233" maxlength="10"
                        class="input-boutique border-wa flex-1 p-4 rounded-2xl text-white outline-none text-lg font-bold">

                    <button onclick="agregarNumeroTag()"
                        class="bg-blue-600/10 border border-blue-500/30 text-blue-400 hover:bg-blue-600 hover:text-white px-6 rounded-2xl font-light text-3xl transition-all active:scale-90 flex items-center justify-center shadow-[0_0_20px_rgba(139,92,246,0.1)] group">
                        <span class="group-hover:rotate-90 transition-transform duration-300">+</span>
                    </button>
                </div>
                <div id="tags-container" class="flex flex-wrap gap-2 min-h-[32px] pt-1"></div>
            </div>

            <div class="space-y-1">
                <div class="flex justify-between items-center px-1">
                    <label class="text-[10px] font-black text-gray-500 uppercase">Mensaje</label>
                    <span id="char-count" class="text-[10px] font-mono text-gray-500">0 / 500</span>
                </div>
                <textarea id="mensaje" rows="3" maxlength="500" oninput="updateCharCount(this)"
                    class="input-boutique border-wa w-full p-4 rounded-2xl text-white outline-none text-base resize-none"></textarea>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-black text-gray-500 uppercase ml-1">Fecha y Hora (Mín +15min)</label>
                <input type="datetime-local" id="fecha"
                    class="input-boutique border-wa w-full p-4 rounded-2xl text-white outline-none text-base">
            </div>

            <button onclick="guardarRegistro()" id="btnMain"
                class="w-full py-5 rounded-3xl font-black text-xs uppercase tracking-[0.2em] shadow-xl active:scale-95 transition-all">Agendar
                Recordatorio</button>
            <button onclick="limpiarFormulario()" id="btnCancel" class="hidden w-full py-5 mt-4 rounded-3xl font-black text-[10px] uppercase tracking-[0.4em] transition-all active:scale-95 flex items-center justify-center gap-2
           bg-red-950/20 border border-red-900/30 text-red-500 hover:bg-red-900/40 hover:text-red-400">

                <i data-lucide="x-circle" class="w-4 h-4"></i>
                <span>Cancelar Edición</span>
            </button>
        </div>

        <div id="view-list" class="hidden space-y-6">
            <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                <button onclick="setFilter('all')" id="f-all"
                    class="filter-pill active-wa px-5 py-2 rounded-full text-[12px] uppercase font-bold">Todos</button>
                <button onclick="setFilter('wa')" id="f-wa"
                    class="filter-pill px-5 py-2 rounded-full text-[12px] uppercase font-bold">WhatsApp</button>
                <button onclick="setFilter('tg')" id="f-tg"
                    class="filter-pill px-5 py-2 rounded-full text-[12px] uppercase font-bold">Telegram</button>
            </div>

            <div class="px-2 mb-4">
                <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-1">Consultar
                    Mensajes</label>
                <div class="relative flex items-center gap-2 mt-1">
                    <input type="date" id="filtro-fecha" onchange="resetearYFiltrar()"
                        class="input-boutique w-32 p-4 rounded-2xl text-white outline-none text-sm border-white/10">
                    <input type="tel" id="busqueda-tel" oninput="validarYFiltrar(this)" maxlength="10"
                        placeholder="Buscar..."
                        class="input-boutique flex-1 p-4 rounded-2xl text-white outline-none text-xs border-white/10">
                </div>
            </div>

            <div id="contenedor-mensajes" class="space-y-4"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
