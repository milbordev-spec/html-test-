<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MaibaSync Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #05070a;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            transition: all 0.5s ease;
        }

        .glass-card {
            background: rgba(17, 25, 40, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-boutique {
            background: #0f172a !important;
            border: 1px solid #1e293b;
            transition: all 0.3s;
        }

        .accent-wa {
            color: #10b981;
        }

        .accent-tg {
            color: #3b82f6;
        }

        .border-wa:focus {
            border-color: #10b981 !important;
        }

        .border-tg:focus {
            border-color: #3b82f6 !important;
        }

        .tab-active-wa {
            color: #10b981;
            border-bottom: 2px solid #10b981;
        }

        .tab-active-tg {
            color: #3b82f6;
            border-bottom: 2px solid #3b82f6;
        }

        .filter-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }

        .filter-pill.active-wa {
            background: #10b981;
            color: black;
            border-color: #10b981;
            font-weight: 900;
        }

        .filter-pill.active-tg {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
            font-weight: 900;
        }

        .msg-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-card {
            animation: fadeIn 0.4s ease forwards;
        }
    </style>
</head>

<body class="p-4 min-h-screen">

    <div class="max-w-md mx-auto space-y-4">
        <!-- HEADER -->
        <div class="text-center pt-4 mb-2">
            <h1 class="text-3xl font-black italic tracking-tighter transition-colors duration-500">
                Maiba<span id="brand-sync" class="text-green-500 text-4xl transition-colors duration-500">Sync</span>
            </h1>
        </div>

        <!-- TABS -->
        <div class="flex border-b border-gray-800 mb-6">
            <button onclick="switchTab('form')" id="tab-form"
                class="flex-1 py-4 font-black text-xs tracking-widest tab-active-wa uppercase transition-all">Programar</button>
            <button onclick="switchTab('list')" id="tab-list"
                class="flex-1 py-4 font-black text-xs tracking-widest text-gray-500 uppercase transition-all">Mis
                Mensajes</button>
        </div>

        <!-- VISTA FORMULARIO -->
        <div id="view-form" class="glass-card rounded-[2.5rem] p-7 space-y-5">
            <input type="hidden" id="edit-id">

            <div class="flex bg-black/40 p-1 rounded-xl border border-white/5">
                <button onclick="setCanal('tg')" id="btn-tg"
                    class="flex-1 py-3 rounded-lg text-xs font-black text-gray-500 uppercase flex items-center justify-center gap-2 transition-all">
                    Telegram
                </button>
                <button onclick="setCanal('wa')" id="btn-wa"
                    class="flex-1 py-3 rounded-lg text-xs font-black bg-green-500 text-white uppercase flex items-center justify-center gap-2 transition-all shadow-lg">
                    WhatsApp
                </button>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-black text-gray-500 uppercase ml-1">Teléfono (10 dígitos)</label>
                <input type="tel" id="telefono" maxlength="10" placeholder="6441234567"
                    class="input-boutique border-wa w-full p-4 rounded-2xl text-white outline-none text-lg font-bold">
            </div>

            <div class="space-y-1">
                <div class="flex justify-between items-center px-1">
                    <label class="text-[10px] font-black text-gray-500 uppercase">Mensaje</label>
                    <span id="char-count" class="text-[10px] font-mono text-gray-500">0 / 500</span>
                </div>
                <textarea id="mensaje" rows="3" maxlength="500" oninput="updateCharCount(this)"
                    class="input-boutique border-wa w-full p-4 rounded-2xl text-white outline-none text-base resize-none"></textarea>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-black text-gray-500 uppercase ml-1">Fecha y Hora</label>
                <input type="datetime-local" id="fecha"
                    class="input-boutique border-wa w-full p-4 rounded-2xl text-white outline-none text-base">
            </div>

            <button onclick="validarYGuardar()" id="btnMain"
                class="w-full py-5 bg-white text-black rounded-3xl font-black text-xs uppercase tracking-[0.2em] shadow-xl active:scale-95 transition-all">
                Agendar Recordatorio
            </button>
        </div>

        <!-- VISTA LISTADO -->
        <div id="view-list" class="hidden space-y-6">
            <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                <button onclick="setFilter('all')" id="f-all"
                    class="filter-pill active-wa px-5 py-2 rounded-full text-[10px] uppercase font-bold">Todos</button>
                <button onclick="setFilter('wa')" id="f-wa"
                    class="filter-pill px-5 py-2 rounded-full text-[10px] uppercase font-bold">WhatsApp</button>
                <button onclick="setFilter('tg')" id="f-tg"
                    class="filter-pill px-5 py-2 rounded-full text-[10px] uppercase font-bold">Telegram</button>
            </div>
            <div id="contenedor-mensajes" class="space-y-4"></div>
            <button onclick="cargarMas()" id="btn-more"
                class="hidden w-full py-4 border border-dashed border-gray-700 rounded-2xl text-gray-500 text-[10px] font-black uppercase tracking-widest transition-colors">Cargar
                más</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let canal = 'wa';
        let mensajes = JSON.parse(localStorage.getItem('maiba_msgs') || '[]');
        let itemsAMostrar = 5;
        let filtroActual = 'all';

        // REGLAS DE SPAM
        const SPAM_KEYWORDS = ['ganaste', 'premio', 'click aquí', 'oferta exclusiva', 'urgente', 'dinero fácil'];
        const MIN_MINUTES_BETWEEN_MESSAGES = 5;

        function updateCharCount(el) {
            document.getElementById('char-count').innerText = `${el.value.length} / 500`;
        }

        function setCanal(tipo) {
            canal = tipo;
            const isWa = tipo === 'wa';
            document.getElementById('btn-wa').className = isWa ? 'flex-1 py-3 rounded-lg text-xs font-black bg-green-500 text-white uppercase shadow-lg transition-all' : 'flex-1 py-3 rounded-lg text-xs font-black text-gray-500 uppercase transition-all';
            document.getElementById('btn-tg').className = !isWa ? 'flex-1 py-3 rounded-lg text-xs font-black bg-blue-500 text-white uppercase shadow-lg transition-all' : 'flex-1 py-3 rounded-lg text-xs font-black text-gray-500 uppercase transition-all';
            document.getElementById('brand-sync').className = isWa ? 'text-green-500 text-4xl transition-colors' : 'text-blue-500 text-4xl transition-colors';
            updateThemeStyles(isWa);
            tg.HapticFeedback.impactOccurred('light');
        }

        function updateThemeStyles(isWa) {
            const inputs = document.querySelectorAll('.input-boutique');
            inputs.forEach(i => { i.classList.remove('border-wa', 'border-tg'); i.classList.add(isWa ? 'border-wa' : 'border-tg'); });
            const tab = document.getElementById('tab-form');
            if (tab.classList.contains('tab-active-wa') || tab.classList.contains('tab-active-tg')) {
                tab.classList.remove('tab-active-wa', 'tab-active-tg');
                tab.classList.add(isWa ? 'tab-active-wa' : 'tab-active-tg');
            }
        }

        function validarYGuardar() {
            const tel = document.getElementById('telefono').value.trim();
            const msg = document.getElementById('mensaje').value.toLowerCase();
            const fecStr = document.getElementById('fecha').value;
            const nuevaFecha = new Date(fecStr);

            // 1. Validación de número
            if (!/^\d{10}$/.test(tel)) return tg.showAlert("Ingresa un número válido de 10 dígitos.");

            // 2. Validación de Contenido Sensible
            const detectado = SPAM_KEYWORDS.filter(word => msg.includes(word));
            if (detectado.length > 0) {
                tg.showConfirm(`Alerta: Tu mensaje contiene palabras que podrían marcarse como SPAM (${detectado.join(', ')}). ¿Deseas continuar bajo tu propio riesgo?`, (c) => {
                    if (c) checarIntervalo(tel, nuevaFecha);
                });
            } else {
                checarIntervalo(tel, nuevaFecha);
            }
        }

        function checarIntervalo(tel, nuevaFecha) {
            // 3. Validación de Intervalo de Tiempo (Anti-Burst)
            const colision = mensajes.some(m => {
                const diff = Math.abs(new Date(m.fec) - nuevaFecha) / 1000 / 60;
                return diff < MIN_MINUTES_BETWEEN_MESSAGES;
            });

            if (colision) {
                return tg.showAlert(`¡Cuidado! Tienes otro mensaje programado en un rango menor a ${MIN_MINUTES_BETWEEN_MESSAGES} minutos. Separa los envíos para evitar bloqueos.`);
            }

            ejecutarGuardado();
        }

        function ejecutarGuardado() {
            const tel = document.getElementById('telefono').value.trim();
            const msg = document.getElementById('mensaje').value;
            const fecStr = document.getElementById('fecha').value;
            const editId = document.getElementById('edit-id').value;

            if (editId) {
                const idx = mensajes.findIndex(m => m.id == editId);
                mensajes[idx] = { id: parseInt(editId), tel, msg, fec: fecStr, canal };
            } else {
                mensajes.push({ id: Date.now(), tel, msg, fec: fecStr, canal });
            }

            localStorage.setItem('maiba_msgs', JSON.stringify(mensajes));
            tg.HapticFeedback.notificationOccurred('success');
            limpiarForm();
            switchTab('list');
        }

        function switchTab(v) {
            const isWa = canal === 'wa';
            document.getElementById('view-form').classList.toggle('hidden', v !== 'form');
            document.getElementById('view-list').classList.toggle('hidden', v !== 'list');
            document.getElementById('tab-form').className = `flex-1 py-4 font-black text-[10px] tracking-widest uppercase transition-all ${v === 'form' ? (isWa ? 'tab-active-wa' : 'tab-active-tg') : 'text-gray-500'}`;
            document.getElementById('tab-list').className = `flex-1 py-4 font-black text-[10px] tracking-widest uppercase transition-all ${v === 'list' ? (isWa ? 'tab-active-wa' : 'tab-active-tg') : 'text-gray-500'}`;
            if (v === 'list') renderList();
        }

        function renderList() {
            const cont = document.getElementById('contenedor-mensajes');
            let filtrados = mensajes.filter(m => filtroActual === 'all' || m.canal === filtroActual);
            filtrados.sort((a, b) => new Date(a.fec) - new Date(b.fec));
            const visible = filtrados.slice(0, itemsAMostrar);

            if (filtrados.length === 0) {
                cont.innerHTML = '<div class="text-center py-20 text-gray-600 font-black text-[10px] tracking-widest">BANDEJA VACÍA</div>';
                return;
            }

            cont.innerHTML = visible.map((m, i) => `
                <div class="msg-card p-6 rounded-[2rem] space-y-3 animate-card" style="animation-delay: ${i * 0.05}s">
                    <div class="flex justify-between items-center">
                        <span class="text-[9px] font-black ${m.canal === 'wa' ? 'text-green-400' : 'text-blue-400'} uppercase tracking-widest">${m.canal}</span>
                        <div class="flex gap-4">
                            <button onclick="editar(${m.id})">✏️</button>
                            <button onclick="eliminar(${m.id})">🗑️</button>
                        </div>
                    </div>
                    <h3 class="text-xl font-black text-white">${m.tel}</h3>
                    <p class="text-gray-400 text-sm font-medium">${m.msg}</p>
                    <div class="text-[10px] text-gray-500 font-bold pt-3 border-t border-white/5 uppercase">${m.fec.replace('T', ' @ ')}</div>
                </div>
            `).join('');
        }

        function editar(id) {
            const m = mensajes.find(msg => msg.id === id);
            document.getElementById('telefono').value = m.tel;
            document.getElementById('mensaje').value = m.msg;
            document.getElementById('fecha').value = m.fec;
            document.getElementById('edit-id').value = m.id;
            setCanal(m.canal);
            switchTab('form');
        }

        function eliminar(id) {
            tg.showConfirm("¿Eliminar registro?", (c) => {
                if (c) {
                    mensajes = mensajes.filter(m => m.id !== id);
                    localStorage.setItem('maiba_msgs', JSON.stringify(mensajes));
                    renderList();
                }
            });
        }

        function limpiarForm() {
            document.getElementById('telefono').value = '';
            document.getElementById('mensaje').value = '';
            document.getElementById('edit-id').value = '';
            const d = new Date(); d.setHours(d.getHours() + 1);
            document.getElementById('fecha').value = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
        }

        tg.ready();
        setCanal('wa');
        limpiarForm();
    </script>
</body>

</html>
