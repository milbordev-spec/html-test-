<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MaibaConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #05070a;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .glass-card {
            background: rgba(17, 25, 40, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-boutique {
            background: #0f172a !important;
            border: 1px solid #1e293b;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-boutique:focus {
            border-color: #10b981;
            /* Verde WhatsApp al enfocar */
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
        }

        .tab-active {
            background: #10b981;
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>

<body class="p-6 min-h-screen flex flex-col items-center justify-center">

    <div class="w-full max-w-sm space-y-6">

        <div class="text-center space-y-2">
            <h1 class="text-4xl font-black tracking-tighter text-white">Maiba<span class="text-green-500">Sync</span>
            </h1>
            <p class="text-gray-500 text-[10px] uppercase tracking-[0.2em] font-bold">Multi-Channel Reminders</p>
        </div>

        <div class="glass-card rounded-[2.5rem] p-7 shadow-2xl space-y-6">

            <!-- SELECTOR DE CANAL -->
            <div class="flex bg-black/40 p-1.5 rounded-2xl border border-white/5">
                <button onclick="setCanal('tg')" id="btn-tg"
                    class="flex-1 py-2.5 rounded-xl text-xs font-bold transition-all tab-active">TELEGRAM</button>
                <button onclick="setCanal('wa')" id="btn-wa"
                    class="flex-1 py-2.5 rounded-xl text-xs font-bold text-gray-500 transition-all">WHATSAPP</button>
            </div>

            <!-- TELÉFONO -->
            <div class="space-y-2">
                <label class="block text-[10px] font-black text-gray-400 uppercase ml-1">Número de Destino (10
                    dígitos)</label>
                <input type="tel" id="telefono" placeholder="6441234567" maxlength="10"
                    class="input-boutique w-full p-4 rounded-2xl text-white outline-none text-lg">
            </div>

            <!-- MENSAJE -->
            <div class="space-y-2">
                <label class="block text-[10px] font-black text-gray-400 uppercase ml-1">Contenido del
                    Recordatorio</label>
                <textarea id="mensaje" rows="2" placeholder="Escribe aquí..."
                    class="input-boutique w-full p-4 rounded-2xl text-white outline-none resize-none"></textarea>
            </div>

            <!-- FECHA -->
            <div class="space-y-2">
                <label class="block text-[10px] font-black text-gray-400 uppercase ml-1">Programar (Mínimo +1h)</label>
                <input type="datetime-local" id="fecha"
                    class="input-boutique w-full p-4 rounded-2xl text-white outline-none">
            </div>

            <button onclick="procesar()" id="btnMain"
                class="w-full py-5 bg-white text-black rounded-3xl font-black text-xs shadow-xl transition-all uppercase tracking-widest hover:scale-[1.02] active:scale-95">
                Agendar en la Nube
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let canalSeleccionado = 'tg';
        tg.expand();

        function setCanal(tipo) {
            canalSeleccionado = tipo;
            const btnTg = document.getElementById('btn-tg');
            const btnWa = document.getElementById('btn-wa');

            if (tipo === 'tg') {
                btnTg.classList.add('tab-active'); btnTg.classList.remove('text-gray-500');
                btnWa.classList.remove('tab-active'); btnWa.classList.add('text-gray-500');
            } else {
                btnWa.classList.add('tab-active'); btnWa.classList.remove('text-gray-500');
                btnTg.classList.remove('tab-active'); btnTg.classList.add('text-gray-500');
            }
            tg.HapticFeedback.impactOccurred('light');
        }

        // Setup fecha inicial (+1h)
        const inputFecha = document.getElementById('fecha');
        const d = new Date();
        d.setHours(d.getHours() + 1);
        inputFecha.value = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);

        function procesar() {
            const tel = document.getElementById('telefono').value.trim();
            const msg = document.getElementById('mensaje').value.trim();
            const fechaVal = new Date(document.getElementById('fecha').value);
            const ahora = new Date();

            if (!/^\d{10}$/.test(tel)) {
                tg.showAlert("⚠️ El número debe ser de 10 dígitos.");
                return;
            }
            if (!msg) {
                tg.showAlert("⚠️ ¿Y el mensaje? No lo dejes vacío.");
                return;
            }
            if ((fechaVal - ahora) < (60 * 60 * 1000)) {
                tg.showAlert("⚠️ Ponle al menos 1 hora de diferencia, ¡no seas enfadoso!");
                return;
            }

            // Aquí mandas el JSON a tu FastAPI incluyendo el campo 'canal'
            const payload = {
                telefono: tel,
                mensaje: msg,
                fecha: fechaVal.toISOString(),
                canal: canalSeleccionado // 'tg' o 'wa'
            };

            tg.HapticFeedback.notificationOccurred('success');
            tg.showPopup({
                title: '✅ ¡Programado!',
                message: `Enviaremos tu mensaje por ${canalSeleccionado === 'tg' ? 'Telegram' : 'WhatsApp'} al número ${tel}.`,
                buttons: [{ type: 'ok' }]
            }, () => tg.close());
        }
    </script>
</body>

</html>
