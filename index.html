<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MaibaSync Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #05070a;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .glass-card {
            background: rgba(17, 25, 40, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-boutique {
            background: #0f172a !important;
            border: 1px solid #1e293b;
            transition: all 0.3s;
        }

        .input-boutique:focus {
            border-color: #10b981;
        }

        .tab-active {
            color: #10b981;
            border-bottom: 2px solid #10b981;
        }

        .msg-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="p-4 min-h-screen">

    <div class="max-w-md mx-auto space-y-4">
        <div class="text-center pt-4 mb-2">
            <h1 class="text-3xl font-black">Maiba<span class="text-green-500">Sync</span></h1>
            <p class="text-[9px] text-gray-500 tracking-[0.3em] font-bold uppercase">Anti-Spam Protected</p>
        </div>

        <div class="flex border-b border-gray-800 mb-6">
            <button onclick="switchTab('form')" id="tab-form"
                class="flex-1 py-3 font-bold text-xs tab-active">PROGRAMAR</button>
            <button onclick="switchTab('list')" id="tab-list" class="flex-1 py-3 font-bold text-xs text-gray-500">MIS
                MENSAJES</button>
        </div>

        <!-- VISTA FORMULARIO -->
        <div id="view-form" class="glass-card rounded-[2.5rem] p-7 space-y-5">
            <input type="hidden" id="edit-id">

            <div class="flex bg-black/40 p-1 rounded-xl border border-white/5">
                <button onclick="setCanal('tg')" id="btn-tg"
                    class="flex-1 py-2 rounded-lg text-[10px] font-bold bg-green-500 text-white transition-all">TELEGRAM</button>
                <button onclick="setCanal('wa')" id="btn-wa"
                    class="flex-1 py-2 rounded-lg text-[10px] font-bold text-gray-500 transition-all">WHATSAPP</button>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-black text-gray-500 uppercase ml-1">Teléfono Destino</label>
                <input type="tel" id="telefono" placeholder="6441234567" maxlength="10"
                    class="input-boutique w-full p-4 rounded-2xl text-white outline-none">
            </div>

            <div class="space-y-1">
                <div class="flex justify-between items-center px-1">
                    <label class="text-[10px] font-black text-gray-500 uppercase">Mensaje</label>
                    <span id="char-count" class="text-[9px] text-gray-500">0 / 500</span>
                </div>
                <textarea id="mensaje" rows="3" maxlength="500" placeholder="¿Qué quieres decir?"
                    oninput="updateCharCount(this)"
                    class="input-boutique w-full p-4 rounded-2xl text-white outline-none resize-none"></textarea>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-black text-gray-500 uppercase ml-1">Fecha y Hora</label>
                <input type="datetime-local" id="fecha"
                    class="input-boutique w-full p-4 rounded-2xl text-white outline-none">
            </div>

            <button onclick="guardarRegistro()" id="btnMain"
                class="w-full py-5 bg-white text-black rounded-3xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all">
                Agendar Recordatorio
            </button>
        </div>

        <!-- VISTA LISTADO -->
        <div id="view-list" class="hidden space-y-4">
            <div id="contenedor-mensajes" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let canal = 'tg';
        let mensajes = JSON.parse(localStorage.getItem('maiba_msgs') || '[]');

        function updateCharCount(el) {
            document.getElementById('char-count').innerText = `${el.value.length} / 500`;
            if (el.value.length >= 450) document.getElementById('char-count').classList.add('text-orange-500');
            else document.getElementById('char-count').classList.remove('text-orange-500');
        }

        function switchTab(view) {
            document.getElementById('view-form').classList.toggle('hidden', view !== 'form');
            document.getElementById('view-list').classList.toggle('hidden', view !== 'list');
            document.getElementById('tab-form').classList.toggle('tab-active', view === 'form');
            document.getElementById('tab-list').classList.toggle('tab-active', view === 'list');
            if (view === 'list') renderList();
            tg.HapticFeedback.impactOccurred('light');
        }

        function setCanal(tipo) {
            canal = tipo;
            document.getElementById('btn-tg').className = tipo === 'tg' ? 'flex-1 py-2 rounded-lg text-[10px] font-bold bg-green-500 text-white shadow-lg' : 'flex-1 py-2 rounded-lg text-[10px] font-bold text-gray-500';
            document.getElementById('btn-wa').className = tipo === 'wa' ? 'flex-1 py-2 rounded-lg text-[10px] font-bold bg-green-500 text-white shadow-lg' : 'flex-1 py-2 rounded-lg text-[10px] font-bold text-gray-500';
        }

        function guardarRegistro() {
            const tel = document.getElementById('telefono').value.trim();
            const msg = document.getElementById('mensaje').value.trim();
            const fecStr = document.getElementById('fecha').value;
            const editId = document.getElementById('edit-id').value;
            const nuevaFecha = new Date(fecStr);
            const ahora = new Date();

            // 1. Validaciones básicas
            if (!/^\d{10}$/.test(tel)) return tg.showAlert("⚠️ Número inválido (10 dígitos).");
            if (!msg) return tg.showAlert("⚠️ Escribe un mensaje.");
            if ((nuevaFecha - ahora) < (60 * 60 * 1000)) return tg.showAlert("⚠️ Mínimo 1 hora a futuro.");

            // 2. VALIDACIÓN ANTISPAM (Límite 1 hora entre mensajes al mismo número)
            const unaHoraEnMs = 60 * 60 * 1000;
            const conflicto = mensajes.find(m =>
                m.tel === tel &&
                m.id != editId &&
                Math.abs(new Date(m.fec) - nuevaFecha) < unaHoraEnMs
            );

            if (conflicto) {
                tg.HapticFeedback.notificationOccurred('error');
                return tg.showAlert(`⚠️ Spam detectado. Ya hay un mensaje para ${tel} cerca de esa hora. Debes dejar al menos 1 hora de diferencia.`);
            }

            // 3. Guardar
            if (editId) {
                const idx = mensajes.findIndex(m => m.id == editId);
                mensajes[idx] = { id: editId, tel, msg, fec: fecStr, canal };
            } else {
                mensajes.push({ id: Date.now(), tel, msg, fec: fecStr, canal });
            }

            localStorage.setItem('maiba_msgs', JSON.stringify(mensajes));
            tg.HapticFeedback.notificationOccurred('success');
            limpiarForm();
            switchTab('list');
        }

        function renderList() {
            const cont = document.getElementById('contenedor-mensajes');
            if (mensajes.length === 0) {
                cont.innerHTML = '<div class="text-center py-20 text-gray-600">No hay mensajes.</div>';
                return;
            }
            cont.innerHTML = mensajes.map(m => `
                <div class="msg-card p-5 rounded-[2rem] space-y-2">
                    <div class="flex justify-between items-center">
                        <span class="text-[9px] font-black text-green-400 uppercase">${m.canal}</span>
                        <div class="flex gap-3">
                            <button onclick="editar(${m.id})" class="text-xs">✏️</button>
                            <button onclick="eliminar(${m.id})" class="text-xs text-red-400">🗑️</button>
                        </div>
                    </div>
                    <h3 class="font-bold">${m.tel}</h3>
                    <p class="text-gray-400 text-xs">${m.msg}</p>
                    <div class="text-[9px] text-gray-500 font-mono italic pt-2 border-t border-white/5">⏰ ${m.fec.replace('T', ' ')}</div>
                </div>
            `).join('');
        }

        function eliminar(id) {
            tg.showConfirm("¿Eliminar recordatorio?", (c) => {
                if (c) {
                    mensajes = mensajes.filter(m => m.id !== id);
                    localStorage.setItem('maiba_msgs', JSON.stringify(mensajes));
                    renderList();
                }
            });
        }

        function editar(id) {
            const m = mensajes.find(msg => msg.id === id);
            document.getElementById('telefono').value = m.tel;
            document.getElementById('mensaje').value = m.msg;
            document.getElementById('fecha').value = m.fec;
            document.getElementById('edit-id').value = m.id;
            updateCharCount(document.getElementById('mensaje'));
            setCanal(m.canal);
            switchTab('form');
            document.getElementById('btnMain').innerText = "ACTUALIZAR REGISTRO";
        }

        function limpiarForm() {
            document.getElementById('telefono').value = '';
            document.getElementById('mensaje').value = '';
            document.getElementById('edit-id').value = '';
            document.getElementById('char-count').innerText = "0 / 500";
            document.getElementById('btnMain').innerText = "AGENDAR RECORDATORIO";
            const d = new Date(); d.setHours(d.getHours() + 1);
            document.getElementById('fecha').value = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
        }

        limpiarForm();
    </script>
</body>

</html>
