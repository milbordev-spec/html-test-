<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MaibaSync Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <script>eruda.init();</script>
</head>

<body class="p-4 min-h-screen">
    <div class="max-w-md mx-auto space-y-4">
        <div class="text-center pt-4 mb-2">
            <h1 class="text-3xl font-black italic tracking-tighter transition-colors duration-500">
                Maiba<span id="brand-sync" class="text-green-500 text-4xl transition-colors duration-500">Sync</span>
            </h1>
            <p class="text-[9px] text-gray-600 font-bold tracking-[0.3em] uppercase mt-1">Enterprise Security Protocol
            </p>
        </div>

        <div class="flex border-b border-blue-800 mb-6">
            <button onclick="switchTab('form')" id="tab-form"
                class="flex-1 py-4 font-black text-xs tracking-widest tab-active-wa uppercase transition-all">Programar</button>
            <button onclick="switchTab('list')" id="tab-list"
                class="flex-1 py-4 font-black text-xs tracking-widest text-gray-500 uppercase transition-all">Mis
                Mensajes</button>
        </div>

        <div id="view-form" class="glass-card rounded-[2.5rem] p-7 space-y-5">
            <input type="hidden" id="edit-id">
            <div class="flex bg-black/40 p-1 rounded-xl border border-white/5">
                <button onclick="setCanal('tg')" id="btn-tg"
                    class="flex-1 py-3 rounded-lg text-xs font-black text-gray-500 uppercase flex items-center justify-center gap-2 transition-all">
                    <i data-lucide="send" class="w-4 h-4"></i> <span>Telegram</span>
                </button>
                <button onclick="setCanal('wa')" id="btn-wa"
                    class="flex-1 py-3 rounded-lg text-xs font-black bg-green-500 text-white uppercase flex items-center justify-center gap-2 transition-all shadow-lg">
                    <i data-lucide="message-circle" class="w-4 h-4"></i> <span>WhatsApp</span>
                </button>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black text-gray-500 uppercase ml-1">Destinatarios (Máx 3)</label>
                <div class="flex gap-2">
                    <input type="tel" id="telefono-input" placeholder="6441112233" maxlength="10"
                        class="input-boutique border-wa flex-1 p-4 rounded-2xl text-white outline-none text-lg font-bold">

                    <button onclick="agregarNumeroTag()"
                        class="bg-blue-600/10 border border-blue-500/30 text-blue-400 hover:bg-blue-600 hover:text-white px-6 rounded-2xl font-light text-3xl transition-all active:scale-90 flex items-center justify-center shadow-[0_0_20px_rgba(139,92,246,0.1)] group">
                        <span class="group-hover:rotate-90 transition-transform duration-300">+</span>
                    </button>
                </div>
                <div id="tags-container" class="flex flex-wrap gap-2 min-h-[32px] pt-1"></div>
            </div>

            <div class="space-y-1">
                <div class="flex justify-between items-center px-1">
                    <label class="text-[10px] font-black text-gray-500 uppercase">Mensaje</label>
                    <span id="char-count" class="text-[10px] font-mono text-gray-500">0 / 500</span>
                </div>
                <textarea id="mensaje" rows="3" maxlength="500" oninput="updateCharCount(this)"
                    class="input-boutique border-wa w-full p-4 rounded-2xl text-white outline-none text-base resize-none"></textarea>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-black text-gray-500 uppercase ml-1">Fecha y Hora (Mín +15min)</label>
                <input type="datetime-local" id="fecha"
                    class="input-boutique border-wa w-full p-4 rounded-2xl text-white outline-none text-base">
            </div>

            <button onclick="guardarRegistro()" id="btnMain"
                class="w-full py-5 rounded-3xl font-black text-xs uppercase tracking-[0.2em] shadow-xl active:scale-95 transition-all">Agendar
                Recordatorio</button>
            <button onclick="limpiarFormulario()" id="btnCancel" class="hidden w-full py-5 mt-4 rounded-3xl font-black text-[10px] uppercase tracking-[0.4em] transition-all active:scale-95 flex items-center justify-center gap-2
           bg-red-950/20 border border-red-900/30 text-red-500 hover:bg-red-900/40 hover:text-red-400">

                <i data-lucide="x-circle" class="w-4 h-4"></i>
                <span>Cancelar Edición</span>
            </button>
        </div>

        <div id="view-list" class="hidden space-y-6">
            <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                <button onclick="setFilter('all')" id="f-all"
                    class="filter-pill active-wa px-5 py-2 rounded-full text-[12px] uppercase font-bold">Todos</button>
                <button onclick="setFilter('wa')" id="f-wa"
                    class="filter-pill px-5 py-2 rounded-full text-[12px] uppercase font-bold">WhatsApp</button>
                <button onclick="setFilter('tg')" id="f-tg"
                    class="filter-pill px-5 py-2 rounded-full text-[12px] uppercase font-bold">Telegram</button>
            </div>

            <div class="px-2 mb-4">
                <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-1">Consultar
                    Mensajes</label>
                <div class="relative flex items-center gap-2 mt-1">
                    <input type="date" id="filtro-fecha" onchange="resetearYFiltrar()"
                        class="input-boutique w-32 p-4 rounded-2xl text-white outline-none text-sm border-white/10">
                    <input type="number" id="busqueda-tel" oninput="manejarBusqueda(this.value)"
                        placeholder="Buscar 10 dígitos..."
                        class="input-boutique flex-1 p-4 rounded-2xl text-white outline-none text-xs border-white/10" />
                </div>
            </div>

            <!-- Tablero de Estadísticas -->
            <!-- Tablero de Monitoreo Diario -->
            <div id="stats-container" class="grid grid-cols-2 gap-4 mb-6 px-2">
                <!-- Contador Pendientes -->
                <div
                    class="relative overflow-hidden bg-white/5 border border-white/10 p-5 rounded-[2rem] flex flex-col items-center justify-center transition-all">
                    <div class="absolute top-0 right-0 p-3 opacity-20">
                        <i data-lucide="clock" class="w-8 h-8 text-yellow-500"></i>
                    </div>
                    <span class="text-[9px] font-black text-gray-500 uppercase tracking-[0.2em] mb-1">Pendientes
                        Hoy</span>
                    <div class="flex items-baseline gap-1">
                        <span id="count-pending" class="text-3xl font-black text-yellow-500 tracking-tighter">0</span>
                        <span class="text-[10px] font-bold text-yellow-500/50 uppercase">msg</span>
                    </div>
                </div>

                <!-- Contador Enviados -->
                <div
                    class="relative overflow-hidden bg-white/5 border border-white/10 p-5 rounded-[2rem] flex flex-col items-center justify-center transition-all">
                    <div class="absolute top-0 right-0 p-3 opacity-20">
                        <i data-lucide="check-circle" class="w-8 h-8 text-green-500" id="icon-sent-color"></i>
                    </div>
                    <span class="text-[9px] font-black text-gray-500 uppercase tracking-[0.2em] mb-1">Enviados
                        Hoy</span>
                    <div class="flex items-baseline gap-1">
                        <span id="count-sent" class="text-3xl font-black text-green-500 tracking-tighter"
                            id="text-sent-color">0</span>
                        <span class="text-[10px] font-bold text-green-500/50 uppercase">ok</span>
                    </div>
                </div>
            </div>

            <div id="contenedor-mensajes" class="space-y-4"></div>
            <div id="scroll-anchor" class="h-10 w-full flex items-center justify-center">
                <!-- Aquí puedes poner un spinner de carga -->
                <span class="text-[8px] text-gray-700 tracking-[0.3em] uppercase">MaibaSync Cargando...</span>
            </div>
        </div>
        <!-- MODAL DE REGISTRO EMPRESARIAL (Inyectar aquí) -->
        <!-- Este modal inicia oculto (hidden) y el JS lo activa si no detecta perfil -->

        <div id="modal-registro"
            class="fixed inset-0 z-[100] bg-black/95 backdrop-blur-xl flex items-start sm:items-center justify-center p-4 overflow-y-auto hidden">

            <div
                class="glass-card w-full max-w-md rounded-[2.5rem] p-6 sm:p-8 my-auto space-y-6 border border-white/10 shadow-2xl relative">

                <div class="text-center">
                    <div class="inline-flex p-3 rounded-2xl bg-cyan-500/10 border border-cyan-500/20 mb-4">
                        <i data-lucide="bot-message-square" class="w-8 h-8 text-cyan-400"></i>
                    </div>
                    <h2 class="text-2xl font-black text-white tracking-tight">Registro de Empresa</h2>
                    <p class="text-[10px] text-gray-500 uppercase tracking-[0.2em] mt-1">Configuración MaibaSync Pro</p>
                </div>

                <div class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-500 uppercase ml-1">Nombre de la Empresa</label>
                        <input type="text" id="reg-empresa" placeholder="Ej. MaibaVet Obregón"
                            class="input-boutique border-white/10 focus:border-cyan-500/50 w-full p-4 rounded-2xl text-white outline-none text-base bg-white/5">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-500 uppercase ml-1">Nombre del titular</label>
                        <input type="text" id="reg-nombre-titular" placeholder="Manuel Hernandez"
                            class="input-boutique border-white/10 focus:border-cyan-500/50 w-full p-4 rounded-2xl text-white outline-none text-sm bg-white/5">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-500 uppercase ml-1">Dirección (Calle y
                            Número)</label>
                        <input type="text" id="reg-direccion" placeholder="Av. Aquiles Serdán 123"
                            class="input-boutique border-white/10 focus:border-cyan-500/50 w-full p-4 rounded-2xl text-white outline-none text-sm bg-white/5">
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-gray-500 uppercase ml-1">Ciudad</label>
                            <input type="text" id="reg-ciudad" value="Guadalajara"
                                class="input-boutique border-white/10 focus:border-cyan-500/50 w-full p-4 rounded-2xl text-white outline-none text-sm bg-white/5">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-gray-500 uppercase ml-1">Estado</label>
                            <input type="text" id="reg-estado" value="Jalisco"
                                class="input-boutique border-white/10 focus:border-cyan-500/50 w-full p-4 rounded-2xl text-white outline-none text-sm bg-white/5">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-gray-500 uppercase ml-1">País</label>
                            <input type="text" id="reg-pais" value="Mexico"
                                class="input-boutique border-white/10 focus:border-cyan-500/50 w-full p-4 rounded-2xl text-white outline-none text-sm bg-white/5">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-gray-500 uppercase ml-1">WhatsApp de
                                Negocio</label>
                            <input type="tel" id="reg-telefono" placeholder="644XXXXXXX" maxlength="10"
                                class="input-boutique border-white/10 focus:border-cyan-500/50 w-full p-4 rounded-2xl text-white outline-none text-base font-mono bg-white/5">
                        </div>
                    </div>
                </div>

                <button onclick="finalizarRegistro()"
                    class="w-full py-5 bg-gradient-to-r from-cyan-500 to-teal-500 hover:from-cyan-400 hover:to-teal-400 text-black font-black text-xs uppercase tracking-widest rounded-3xl transition-all shadow-[0_0_30px_rgba(6,182,212,0.3)] active:scale-95">
                    Registrarse
                </button>
            </div>
        </div>



        <script src="app.js"></script>
</body>

</html>
